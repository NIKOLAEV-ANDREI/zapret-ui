name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Application release tag, for example app-1.0.1'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release tag matches app version
        run: |
          APP_VERSION=$(cat utils/app_version.txt)
          EXPECTED_TAG="app-${APP_VERSION}"
          if [ "$EXPECTED_TAG" != "${{ github.event.inputs.tag }}" ]; then
            echo "Error: tag '${{ github.event.inputs.tag }}' does not match app version tag '${EXPECTED_TAG}'"
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar rar

      - name: Prepare release bundle
        run: |
          NAME="zapret-ui-${{ github.event.inputs.tag }}"

          mkdir "$NAME"

          cp -r bin "$NAME/"
          cp -r lists "$NAME/"
          cp -r utils "$NAME/"
          cp -r ui "$NAME/"
          cp *.bat "$NAME/"
          cp zapret.exe "$NAME/"

          cp README.md "$NAME/"
          cp README_UI.md "$NAME/"
          cp LICENSE.txt "$NAME/"

          (
            cd "$NAME"
            find . -type f -exec sha256sum {} \;
          ) > "$NAME/SHA256SUMS.txt"

      - name: Create archives
        run: |
          NAME="zapret-ui-${{ github.event.inputs.tag }}"

          zip -qr "${NAME}.zip" "$NAME"
          rar a -idq "${NAME}.rar" "$NAME"
          tar --owner=0 --group=0 -czf "${NAME}.tar.gz" "$NAME"
          cp zapret.exe zapret-ui-app.exe

      - name: Print SHA256 checksums
        run: |
          NAME="zapret-ui-${{ github.event.inputs.tag }}"

          sha256sum \
            "${NAME}.zip" \
            "${NAME}.rar" \
            "${NAME}.tar.gz" \
            zapret-ui-app.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            zapret-ui-${{ github.event.inputs.tag }}.zip
            zapret-ui-${{ github.event.inputs.tag }}.rar
            zapret-ui-${{ github.event.inputs.tag }}.tar.gz
            zapret-ui-app.exe
